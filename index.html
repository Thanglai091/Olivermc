    <!-- Floating Moving Stars Overlay -->

    <div class="container">
        <div class="glass-panel">
            <div class="status-badge">
                <span class="status-dot"></span>

            </div>

            <div class="icon-wrapper">
                <!-- Orbiting Moon / Ring Effect -->
                <div class="orbit-container">
                    <div class="orbit-ring-rotate">
                        <div class="orbit-moon"></div>
                    </div>
                </div>
                <!-- Minecraft Icon -->
                <svg class="mc-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2.5L2.5 7.5L12 12.5L21.5 7.5L12 2.5Z" fill="url(#topGrad)" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" stroke-linejoin="round"/>

                    <path d="M21.5 7.5V17L12 22V12.5L21.5 7.5Z" fill="url(#rightGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="topGrad" x1="12" y1="2.5" x2="12" y2="12.5" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#c084fc"/>
                            <stop offset="1" stop-color="#7e22ce"/>
                        </linearGradient>
                        <linearGradient id="leftGrad" x1="2.5" y1="7.5" x2="12" y2="22" gradientUnits="userSpaceOnUse">

                        <linearGradient id="rightGrad" x1="21.5" y1="7.5" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#10b981"/>
                            <stop offset="1" stop-color="#047857"/>

                    </defs>

            <h1 class="main-title aurora-text-animate">OLIVER NETWORK</h1>
            <p class="description">Khám phá thế giới sinh tồn vô tận với những tính năng độc quyền. Nơi bắt đầu những huyền thoại Minecraft Bedrock!</p>
            
            <div class="info-dashboard">
                <div class="info-card">
                    <span class="info-label">IP ADDRESS</span>
                    <span class="info-value pixel-font hacker-text aurora-text-animate" data-value="103.116.52.8">103.116.52.8</span>
                </div>
                <div class="info-divider"></div>
                <div class="info-card">
                    <span class="info-label">PORT</span>

            <div class="action-group">
                <a href="minecraft://?addExternalServer=Oliver|103.116.52.8:19132" class="btn btn-aurora">

                </a>
                
                <a href="https://m.me/j/AbZ5twD4V8m28DGB/?send_source=gc%3Acopy_invite_link_c" target="_blank" class="btn btn-secondary">

    </div>

    <script>
        // Hiệu ứng "Hacker" nhảy số liên tục không bao giờ dừng (Giấu IP/Port thật)
        const letters = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*";
        const targets = document.querySelectorAll('.hacker-text');

        function scrambleForever(element) {
            const length = element.dataset.value.length;
            
            setInterval(() => {
                let randomText = "";
                for (let i = 0; i < length; i++) {
                    randomText += letters[Math.floor(Math.random() * letters.length)];
                }
                element.innerText = randomText;
            }, 40); // Tốc độ nhảy số cực nhanh
        }

        targets.forEach(target => {
            scrambleForever(target);
        });
    </script>
